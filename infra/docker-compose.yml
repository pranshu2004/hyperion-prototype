version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: hyperion
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hyperion_db
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hyperion-net

  api-gateway:
    build: ../services/api-gateway
    ports:
      - "8000:8000"
    environment:
      # Internal network calls hit port 8000
      - RIDE_SERVICE_URL=http://ride-service:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - hyperion-net
    depends_on:
      - ride-service

  ride-service:
    build: ../services/ride-service
    ports:
      # Maps external 8001 to internal 8000
      - "8001:8000"
    environment:
      # Internal network calls hit port 8000
      - DRIVER_SERVICE_URL=http://driver-matching-service:8000
      - PRICING_SERVICE_URL=http://pricing-service:8000
      - PAYMENT_SERVICE_URL=http://payment-service:8000
      - NOTIFICATION_SERVICE_URL=http://notification-service:8000
      - DATABASE_URL=postgresql://hyperion:password@postgres:5432/hyperion_db
      - API_GATEWAY_URL=http://api-gateway:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - hyperion-net
    depends_on:
      - postgres

  driver-matching-service:
    build: ../services/driver-matching-service
    ports:
      - "8002:8000"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - hyperion-net

  pricing-service:
    build: ../services/pricing-service
    ports:
      - "8003:8000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - hyperion-net

  payment-service:
    build: ../services/payment-service
    ports:
      - "8004:8000"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - hyperion-net

  notification-service:
    build: ../services/notification-service
    ports:
      - "8005:8000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - hyperion-net

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    networks:
      - hyperion-net

  load-generator:
    build: ../load-generator
    environment:
      - API_GATEWAY_URL=http://api-gateway:8000
      - RPS=2
    networks:
      - hyperion-net
    depends_on:
      - api-gateway

networks:
  hyperion-net:
    driver: bridge
